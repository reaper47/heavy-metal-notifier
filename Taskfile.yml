version: '3'

tasks:
  build:
    cmds:
      - cmd: go generate ./...
      - cmd: go build -ldflags="-s -w" -o bin/metal.exe main.go
        platforms: [windows]
      - cmd: go build -ldflags="-s -w" -o bin/metal.exe main.go
        platforms: [linux, darwin]

  release:
    deps:
      - test
      - build
    requires:
      vars: [tag]
    cmds:
      - go run ./releases/main.go -package github.com/reaper47/heavy-metal-notifier -tag {{.tag}}
      - gh release create {{.tag}} ./releases/{{.tag}}/*

  run:
    deps:
      - test
      - build
    cmd: ./bin/metal serve

  test:
    cmd: go test ./...